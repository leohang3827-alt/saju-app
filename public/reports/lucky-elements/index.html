<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=1.0">
  <title>실생활 맞춤 개운법 - AI 사주 리포트</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Serif+KR:wght@300;400;700;900&display=swap');
    
    :root {
      --color-bg-cream: #FCF9F5;
      --color-cream-card: #FAF5EF;
      --color-accent-red: #A61E22;
      --color-accent-gold: #C09D5B;
      --color-text-charcoal: #2A2421;
      --color-text-light: #6E625A;
      --font-serif: 'Noto Serif KR', serif;
      --font-sans: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg-cream);
      font-family: var(--font-sans), sans-serif;
      color: var(--color-text-charcoal);
      line-height: 1.6;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background-color: #FFFFFF;
      border: 1px solid var(--color-accent-gold);
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 8px 32px rgba(42, 36, 33, 0.06);
      position: relative;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    /* Corner Deco */
    .corner-decor {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 2px solid var(--color-accent-gold);
      pointer-events: none;
    }
    .top-left { top: 12px; left: 12px; border-right: none; border-bottom: none; }
    .top-right { top: 12px; right: 12px; border-left: none; border-bottom: none; }
    .bottom-left { bottom: 12px; left: 12px; border-right: none; border-top: none; }
    .bottom-right { bottom: 12px; right: 12px; border-left: none; border-top: none; }

    header {
      text-align: center;
      margin-bottom: 24px;
      position: relative;
    }

    .fan-icon {
      font-size: 28px;
      color: var(--color-accent-red);
      margin-bottom: 8px;
    }

    h1 {
      font-family: var(--font-serif);
      color: var(--color-accent-red);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .sub-title {
      font-size: 11px;
      color: var(--color-accent-gold);
      letter-spacing: 0.15em;
      margin-top: 4px;
      font-weight: 600;
    }

    .divider {
      width: 40px;
      height: 1px;
      background-color: var(--color-accent-gold);
      margin: 12px auto;
    }

    /* User Badge */
    .user-badge {
      background-color: var(--color-cream-card);
      border: 1px solid rgba(192, 157, 91, 0.3);
      border-radius: 12px;
      padding: 8px 12px;
      text-align: center;
      font-size: 13px;
      margin-bottom: 20px;
      font-family: var(--font-serif);
    }
    .user-badge strong {
      color: var(--color-accent-red);
    }

    /* Lucky Elements Grid */
    .lucky-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
    }

    .lucky-box {
      background-color: var(--color-cream-card);
      border: 1px solid rgba(192, 157, 91, 0.3);
      border-radius: 14px;
      padding: 12px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lucky-icon {
      font-size: 24px;
      background-color: #FFFFFF;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(192,157,91,0.2);
      flex-shrink: 0;
    }

    .lucky-info {
      display: flex;
      flex-direction: column;
    }

    .lucky-label {
      font-size: 10px;
      color: var(--color-text-light);
      margin-bottom: 2px;
    }

    .lucky-val {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text-charcoal);
    }

    /* Color Swatch */
    .color-swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid #ddd;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* Card Layout */
    .card {
      background-color: #FFFFFF;
      border: 1px solid rgba(192, 157, 91, 0.4);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(42, 36, 33, 0.02);
    }

    .card-title {
      font-family: var(--font-serif);
      font-size: 14px;
      font-weight: 700;
      color: var(--color-accent-red);
      border-bottom: 1px dashed var(--color-accent-gold);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }

    .card-content {
      font-size: 13px;
      color: var(--color-text-charcoal);
      line-height: 1.7;
      text-align: justify;
      word-break: keep-all;
    }

    .item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item-list li {
      font-size: 13px;
      line-height: 1.6;
    }

    /* Action Button */
    .btn-close {
      margin-top: auto;
      background-color: var(--color-accent-red);
      color: #FFFFFF;
      border: 1px solid var(--color-accent-gold);
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      width: 100%;
      font-family: var(--font-serif);
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(166, 30, 34, 0.2);
    }
    .btn-close:hover {
      background-color: #8C1619;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="corner-decor top-left"></div>
    <div class="corner-decor top-right"></div>
    <div class="corner-decor bottom-left"></div>
    <div class="corner-decor bottom-right"></div>

    <header>
      <div class="fan-icon">🪭</div>
      <h1>실생활 맞춤 개운법</h1>
      <div class="sub-title">LUCKY ELEMENTS</div>
      <div class="divider"></div>
    </header>

    <div class="user-badge" id="user-badge-container">
      사주를 분석 중입니다...
    </div>

    <!-- Lucky Elements 4 Grid -->
    <div class="lucky-grid">
      <div class="lucky-box">
        <div class="lucky-icon">🎨</div>
        <div class="lucky-info">
          <span class="lucky-label">행운의 색상</span>
          <span class="lucky-val" id="lucky-color">로딩 중</span>
        </div>
      </div>

      <div class="lucky-box">
        <div class="lucky-icon">🔢</div>
        <div class="lucky-info">
          <span class="lucky-label">행운의 숫자</span>
          <span class="lucky-val" id="lucky-number">로딩 중</span>
        </div>
      </div>

      <div class="lucky-box">
        <div class="lucky-icon">🧭</div>
        <div class="lucky-info">
          <span class="lucky-label">행운의 방향</span>
          <span class="lucky-val" id="lucky-direction">로딩 중</span>
        </div>
      </div>

      <div class="lucky-box">
        <div class="lucky-icon">🍀</div>
        <div class="lucky-info">
          <span class="lucky-label">행운의 아이템</span>
          <span class="lucky-val" id="lucky-item">로딩 중</span>
        </div>
      </div>
    </div>

    <!-- Card 1: 행운의 아이템 활용법 -->
    <div class="card">
      <div class="card-title">👜 행운의 패션 & 소품 활용법</div>
      <div class="card-content">
        <ul class="item-list" id="fashion-list">
          <!-- Load elements description -->
        </ul>
      </div>
    </div>

    <!-- Card 2: 개운 행동 지침 -->
    <div class="card">
      <div class="card-title">🚶 운명을 바꾸는 생활 습관</div>
      <div class="card-content" id="lifestyle-desc">
        습관 개운법을 로드 중입니다.
      </div>
    </div>

    <button class="btn-close" onclick="window.close()">창 닫기</button>
  </div>

  <script>
    // Load result
    const resultJson = localStorage.getItem('saju_latest_result');
    if (!resultJson) {
      document.getElementById('user-badge-container').innerHTML = '분석된 사주 정보가 존재하지 않습니다.';
    } else {
      const result = JSON.parse(resultJson);
      const name = result.name;
      const gender = result.input.gender === '남' ? '乾命(남성)' : '坤命(여성)';
      
      // Update badge
      document.getElementById('user-badge-container').innerHTML = `<strong>${name}</strong>님 (${gender}) · 실생활 행운의 요소`;

      // Get weakest element to set lucky elements
      const elementsMap = result.fiveElements;
      const elements = [
        { name: '목', count: elementsMap.wood, parent: '수' },
        { name: '화', count: elementsMap.fire, parent: '목' },
        { name: '토', count: elementsMap.earth, parent: '화' },
        { name: '금', count: elementsMap.metal, parent: '토' },
        { name: '수', count: elementsMap.water, parent: '금' }
      ];
      elements.sort((a, b) => a.count - b.count);
      const targetElement = elements[0].name; // Weakest element (Yongshin)

      let colorText = '';
      let numberText = '';
      let directionText = '';
      let itemText = '';
      let fashionList = [];
      let lifestyle = '';

      if (targetElement === '목') {
        colorText = '<span class="color-swatch" style="background-color: #2E7D32;"></span>초록색, 연두색';
        numberText = '3, 8';
        directionText = '동쪽 (East)';
        itemText = '목조 필기구, 화초';
        fashionList = [
          '**초록색 아이템 매칭**: 넥타이, 스카프, 가방의 참 펜던트, 혹은 속옷을 연두색/초록색 톤으로 코디하여 솟아나는 생동 에너지를 장착하십시오.',
          '**식물과의 동조**: 사무실 책상이나 방 한쪽에 작은 다육식물이나 관엽식물 화분을 하나 두고 키우면 건강과 성장 에너지가 활성화됩니다.',
          '**원목 계열 소품**: 책상에 원목 펜홀더, 대나무 독서대 등 나무 질감의 아이템을 두고 활용하면 집중력 향상과 개운에 좋습니다.'
        ];
        lifestyle = `아침 일찍 기상하여 해가 뜨는 **동쪽**을 바라보고 물 한 잔을 마시거나 가벼운 아침 산책(공원 숲길 권장)을 진행하십시오. 무언가 머릿속에 새로운 아이디어가 떠오를 때 미루지 말고 메모장에 기록하는 '시작하는 습관'이 귀하의 금전과 학업운을 힘차게 열어 줍니다.`;
      } else if (targetElement === '화') {
        colorText = '<span class="color-swatch" style="background-color: #D32F2F;"></span>빨간색, 분홍색';
        numberText = '2, 7';
        directionText = '남쪽 (South)';
        itemText = '화려한 안경, 향수';
        fashionList = [
          '**강렬한 색상 포인트**: 지갑이나 카드홀더, 시계 스트랩을 레드/오렌지 톤으로 과감히 선택하여 강한 표현력과 주목도를 향상하십시오.',
          '**빛(조명)의 적극적 연출**: 거주 공간의 어두운 스팟에 스탠드 조명이나 분위기 램프를 자주 켜두어 어둠을 몰아내고 운을 가득 채우십시오.',
          '**향수를 통한 어필**: 활력이 감도는 시트러스 또는 스파이시한 향수를 아침에 가볍게 뿌려 기분을 고양시키고 이성의 이목을 끌 수 있습니다.'
        ];
        lifestyle = `낮 12시부터 1시 사이(가장 해가 높은 사시/오시)에 따뜻한 자연 햇볕을 약 15분 정도 받으며 걸으십시오. 타인과의 미팅이나 발표 상황에서 다소 화려한 제스처와 명쾌하고 밝은 화법을 의식적으로 구사하는 것이 최고의 성공 비결입니다.`;
      } else if (targetElement === '토') {
        colorText = '<span class="color-swatch" style="background-color: #FBC02D;"></span>노란색, 베이지색';
        numberText = '5, 10';
        directionText = '중앙 (Center)';
        itemText = '도자기 컵, 스톤 원석';
        fashionList = [
          '**단정하고 온화한 베이지 룩**: 연한 브라운, 크림, 베이지색 계열의 옷이나 양말을 착용하여 타인에게 흔들림 없는 듬직한 인상을 안겨주십시오.',
          '**원석 액세서리**: 실버보다 은은한 황색 계열 골드 반지, 또는 호안석/황수정 등 천연 원석 브레이슬릿을 활용하면 심적 평온과 자산운이 상승합니다.',
          '**도자기 및 식기 활용**: 평소 마시는 물이나 커피 컵을 유리잔보다 도자기 머그잔으로 교체하여 대지의 묵직함을 몸으로 받아들이십시오.'
        ];
        lifestyle = `주말마다 흙길, 잔디밭 등 자연을 느낄 수 있는 공간에서 가벼운 등산을 즐기거나 맨발로 흙을 느껴보십시오. 성급하게 결정을 내리지 않고 타인의 성격을 끝까지 품어주는 조율자의 면모를 평소에 습관화하면 일생이 편안해집니다.`;
      } else if (targetElement === '금') {
        colorText = '<span class="color-swatch" style="background-color: #ECEFF1;"></span>흰색, 실버, 메탈';
        numberText = '4, 9';
        directionText = '서쪽 (West)';
        itemText = '실버 반지, 메탈 텀블러';
        fashionList = [
          '**깔끔한 톤온톤 흰색 코디**: 셔츠를 칼같이 깨끗한 흰색으로 착용하거나, 실버 메탈 시계나 액세서리를 통해 날카롭고 세련된 지성을 뿜어내십시오.',
          '**메탈 소품 소지**: 매일 마시는 텀블러를 스테인리스 메탈 재질로 활용하고, 거울과 가위를 가방 속에 단정하게 넣어 다니면 액운을 차단하는 정돈 효과가 납니다.',
          '**반듯하고 심플한 외양**: 헤어스타일과 손톱 등을 항상 깔끔하고 단정하게 유지하는 것이 명리학적 쇠의 예리한 결단을 강화합니다.'
        ];
        lifestyle = `주변의 복잡한 서류, 입지 않는 옷, 정리되지 않은 관계를 빠르게 정리하고 심플하게 유지하십시오. 아침 5분 스트레칭이나 저녁 반신욕을 통해 체내 독소를 깎아내고 군더더기 없는 계획적인 하루 시간표를 작성하여 실천하는 습관이 중요합니다.`;
      } else if (targetElement === '수') {
        colorText = '<span class="color-swatch" style="background-color: #1A237E;"></span>검은색, 네이비, 블루';
        numberText = '1, 6';
        directionText = '북쪽 (North)';
        itemText = '가습기, 물고기 그림';
        fashionList = [
          '**네이비와 블랙 조합**: 중요한 계약이나 비즈니스 자리에 나갈 때 네이비 슈트, 검정 셔츠나 가죽 지갑을 매치하여 지적인 위엄과 깊이를 전하십시오.',
          '**침실 물의 조화**: 침실이나 거실 구석에 은은한 초음파식 가습기를 켜두어 방안의 습도를 풍부하게 유지하면 순환과 기운 소생에 좋습니다.',
          '**블루투스 음악 활용**: 평소 뇌파를 맑게 해주는 클래식이나 재즈 등 조용하고 잔잔한 음악을 블루투스 스피커로 방안에 늘 잔잔히 흐르게 하십시오.'
        ];
        lifestyle = `하루 마무리에 일기를 쓰거나 가볍게 호흡하며 명상하는 '차분한 밤의 사색 시간'을 10분씩 무조건 가지십시오. 타인과의 조율 상황에서 고집을 피우기보단 부드럽게 돌아가 타협하되, 자신의 지적 통찰력은 고요하게 칼날처럼 기르는 내공이 운을 틔웁니다.`;
      }

      // Update basic fields
      document.getElementById('lucky-color').innerHTML = colorText;
      document.getElementById('lucky-number').innerHTML = numberText;
      document.getElementById('lucky-direction').innerHTML = directionText;
      document.getElementById('lucky-item').innerHTML = itemText;

      // Populate list
      const fashionUl = document.getElementById('fashion-list');
      fashionUl.innerHTML = fashionList.map(item => {
        const parts = item.split('**:');
        const title = parts[0].replace('**', '');
        return `<li><strong>${title}</strong>: ${parts[1]}</li>`;
      }).join('');

      document.getElementById('lifestyle-desc').innerHTML = lifestyle;
    }
  </script>
</body>
</html>
