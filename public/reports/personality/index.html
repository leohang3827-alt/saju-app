<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=1.0">
  <title>기질 및 성향 분석 - AI 사주 리포트</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Serif+KR:wght@300;400;700;900&display=swap');
    
    :root {
      --color-bg-cream: #FCF9F5;
      --color-cream-card: #FAF5EF;
      --color-accent-red: #A61E22;
      --color-accent-gold: #C09D5B;
      --color-text-charcoal: #2A2421;
      --color-text-light: #6E625A;
      --font-serif: 'Noto Serif KR', serif;
      --font-sans: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg-cream);
      font-family: var(--font-sans), sans-serif;
      color: var(--color-text-charcoal);
      line-height: 1.6;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background-color: #FFFFFF;
      border: 1px solid var(--color-accent-gold);
      border-radius: 20px;
      padding: 24px 20px;
      box-shadow: 0 8px 32px rgba(42, 36, 33, 0.06);
      position: relative;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    /* Corner Deco */
    .corner-decor {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 2px solid var(--color-accent-gold);
      pointer-events: none;
    }
    .top-left { top: 12px; left: 12px; border-right: none; border-bottom: none; }
    .top-right { top: 12px; right: 12px; border-left: none; border-bottom: none; }
    .bottom-left { bottom: 12px; left: 12px; border-right: none; border-top: none; }
    .bottom-right { bottom: 12px; right: 12px; border-left: none; border-top: none; }

    header {
      text-align: center;
      margin-bottom: 24px;
      position: relative;
    }

    .fan-icon {
      font-size: 28px;
      color: var(--color-accent-red);
      margin-bottom: 8px;
    }

    h1 {
      font-family: var(--font-serif);
      color: var(--color-accent-red);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .sub-title {
      font-size: 11px;
      color: var(--color-accent-gold);
      letter-spacing: 0.15em;
      margin-top: 4px;
      font-weight: 600;
    }

    .divider {
      width: 40px;
      height: 1px;
      background-color: var(--color-accent-gold);
      margin: 12px auto;
    }

    /* User Badge */
    .user-badge {
      background-color: var(--color-cream-card);
      border: 1px solid rgba(192, 157, 91, 0.3);
      border-radius: 12px;
      padding: 8px 12px;
      text-align: center;
      font-size: 13px;
      margin-bottom: 20px;
      font-family: var(--font-serif);
    }
    .user-badge strong {
      color: var(--color-accent-red);
    }

    /* Character Display */
    .character-box {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      height: 130px;
    }
    .character-box img {
      max-height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 8px 16px rgba(166, 30, 34, 0.1));
    }

    /* Card Layout */
    .card {
      background-color: #FFFFFF;
      border: 1px solid rgba(192, 157, 91, 0.4);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(42, 36, 33, 0.02);
      position: relative;
    }

    .card-title {
      font-family: var(--font-serif);
      font-size: 14px;
      font-weight: 700;
      color: var(--color-accent-red);
      border-bottom: 1px dashed var(--color-accent-gold);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }

    .card-content {
      font-size: 13px;
      color: var(--color-text-charcoal);
      line-height: 1.7;
      text-align: justify;
      word-break: keep-all;
    }

    .traits-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .traits-list li {
      font-size: 13px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .traits-list li .bullet {
      color: var(--color-accent-gold);
      font-weight: bold;
    }

    /* Action Button */
    .btn-close {
      margin-top: auto;
      background-color: var(--color-accent-red);
      color: #FFFFFF;
      border: 1px solid var(--color-accent-gold);
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      width: 100%;
      font-family: var(--font-serif);
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(166, 30, 34, 0.2);
    }
    .btn-close:hover {
      background-color: #8C1619;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="corner-decor top-left"></div>
    <div class="corner-decor top-right"></div>
    <div class="corner-decor bottom-left"></div>
    <div class="corner-decor bottom-right"></div>

    <header>
      <div class="fan-icon">🪭</div>
      <h1>기질 및 성향 분석</h1>
      <div class="sub-title">PERSONALITY REPORT</div>
      <div class="divider"></div>
    </header>

    <div class="user-badge" id="user-badge-container">
      사주를 분석 중입니다...
    </div>

    <!-- Character illustration -->
    <div class="character-box" id="char-box">
      <!-- Will load dynamic character -->
    </div>

    <!-- Card 1: 성격 및 기질 총론 -->
    <div class="card">
      <div class="card-title">🪐 타고난 기질 총론</div>
      <div class="card-content" id="temperament-desc">
        성향을 다각도로 정밀 분석하고 있습니다.
      </div>
    </div>

    <!-- Card 2: 강점 -->
    <div class="card">
      <div class="card-title">✨ 성격적 강점 (Advantage)</div>
      <div class="card-content">
        <ul class="traits-list" id="strengths-list">
          <!-- Strengths list dynamically populated -->
        </ul>
      </div>
    </div>

    <!-- Card 3: 조언 및 조율점 -->
    <div class="card">
      <div class="card-title">💡 보완 및 조율점 (Advice)</div>
      <div class="card-content">
        <ul class="traits-list" id="advice-list">
          <!-- Advice list dynamically populated -->
        </ul>
      </div>
    </div>

    <button class="btn-close" onclick="window.close()">창 닫기</button>
  </div>

  <script>
    // Load result
    const resultJson = localStorage.getItem('saju_latest_result');
    if (!resultJson) {
      document.getElementById('user-badge-container').innerHTML = '분석된 사주 정보가 존재하지 않습니다.';
    } else {
      const result = JSON.parse(resultJson);
      const name = result.name;
      const gender = result.input.gender === '남' ? '乾命(남성)' : '坤命(여성)';
      
      // Update badge
      document.getElementById('user-badge-container').innerHTML = `<strong>${name}</strong>님 (${gender}) · 타고난 천성 분석`;

      // Get Day Master
      const dayStem = result.pillarDetails.day.element.stem; // "목", "화", "토", "금", "수"
      
      // Setup dynamic character image
      const charBox = document.getElementById('char-box');
      let charImg = '';
      if (dayStem === '목') charImg = 'wood_large.png';
      else if (dayStem === '화') charImg = 'fire_large.png';
      else if (dayStem === '토') charImg = 'earth_small.png';
      else if (dayStem === '금') charImg = 'metal_small.png';
      else if (dayStem === '수') charImg = 'water_small.png';
      charBox.innerHTML = `<img src="/assets/characters/${charImg}" alt="${dayStem} 기운 캐릭터">`;

      // Generate content based on Day Master
      let desc = '';
      let strengths = [];
      let advice = [];

      if (dayStem === '목') {
        desc = `귀하는 하늘로 쭉쭉 뻗어 나가는 커다란 나무(나무의 기운, 木)를 닮았습니다. 본질적으로 인(仁)을 상징하며, 도덕성과 측은지심을 마음에 품고 태어났습니다. 언제나 생명력과 추진력이 넘치며, 계획성 있고 한 번 목표를 세우면 곧고 굳세게 밀고 가는 리더십의 표본입니다. 새로운 영역을 개척하는 스타터로서 탁월한 재능이 있습니다.`;
        strengths = [
          '리더십과 독립심: 타인에게 기대지 않고 스스로의 목표를 굳건히 세웁니다.',
          '시작하는 힘: 끊임없는 도전 정신과 개척자 기질을 발휘합니다.',
          '바르고 온화한 성품: 불의를 싫어하고, 약자를 도우며 포용력이 넓습니다.'
        ];
        advice = [
          '고집과 독단성: 나무처럼 곧게 뻗으려는 고집이 지나쳐 타인의 의견을 무시하기 쉽습니다.',
          '시작에 비해 약한 마무리: 새로운 것을 벌리기는 좋아하나 마무리에 약할 수 있으니 꼼꼼하게 점검하십시오.',
          '상처와 좌절: 꺾일지언정 굽히지 않는 성정 탓에 한 번 큰 좌절을 겪으면 쉽게 지칠 수 있습니다.'
        ];
      } else if (dayStem === '화') {
        desc = `귀하는 활활 타오르는 불꽃(불의 기운, 火)을 닮았습니다. 본질적으로 예(禮)를 상징하며, 사교적이고 자신의 마음을 솔직하고 밝게 표현하는 능력이 훌륭합니다. 열정적이며 매사 활기가 넘치고, 타인의 기분을 밝혀주는 분위기 메이커 역할을 톡톡히 해냅니다. 감추지 않는 성격으로 신의를 중시하며, 화려하고 예술적인 감각이 뛰어납니다.`;
        strengths = [
          '풍부한 활력과 소통력: 누구와도 쉽게 친해지며 솔직담백한 소통 능력을 뽐냅니다.',
          '행동력과 열정: 결단과 동시에 몸을 사리지 않고 뜨거운 열정으로 몰두합니다.',
          '직관과 감각: 미적이고 창의적인 직관이 매우 뛰어나 독창적인 스타일을 만듭니다.'
        ];
        advice = [
          '감정 기복 제어: 감정이 불처럼 급격히 끓어올랐다가 사그라들 수 있으니 주의하십시오.',
          '경솔함 방지: 너무 솔직하여 필터 없이 나간 말들이 의도치 않은 오해를 부를 수 있습니다.',
          '인내심 강화: 흥미를 잃으면 불꽃이 금방 꺼지듯이 포기가 빨라질 수 있어 끈기가 필요합니다.'
        ];
      } else if (dayStem === '토') {
        desc = `귀하는 만물을 품어주는 드넓은 대지(흙의 기운, 土)를 닮았습니다. 본질적으로 신(信)을 상징하며, 듬직하고 신중하여 주변인들에게 큰 믿음을 주는 중심축입니다. 온화하고 참을성이 깊으며, 극단에 치우치지 않고 균형을 맞추는 조율자의 재능이 있습니다. 한결같으며 신뢰가 깊은 중재자입니다.`;
        strengths = [
          '강한 신뢰감과 묵직함: 말수가 적고 신중하며, 한번 믿은 사람은 끝까지 지킵니다.',
          '탁월한 포용력: 어떤 환경이나 성향을 지닌 사람도 너그럽게 품고 수용합니다.',
          '중재와 관리 능력: 분쟁을 조정하고 시스템을 안정화하는 능력이 매우 뛰어납니다.'
        ];
        advice = [
          '지나친 신중함과 우유부단: 결정을 너무 고민하여 때로는 좋은 타이밍을 놓칠 수 있습니다.',
          '고집과 둔감함: 보수적이고 변화를 싫어하는 면이 있어 새로운 흐름에 적응하기 더딜 수 있습니다.',
          '감정의 누적: 속으로 참고 삭이다가 한 번에 폭발할 수 있으므로 마음의 화를 제때 해소하십시오.'
        ];
      } else if (dayStem === '금') {
        desc = `귀하는 차갑고 날카로운 강철이나 아름다운 보석(쇠의 기운, 金)을 닮았습니다. 본질적으로 의(義)를 상징하며, 공과 사가 뚜렷하고 흐트러짐이 없는 깔끔한 성품의 소유자입니다. 강한 결단력과 책임감, 그리고 세밀한 완벽주의 기질을 겸비하여 본인에게 주어진 과업을 완성도 높게 처리해 냅니다.`;
        strengths = [
          '의리와 정의감: 도리에 어긋나는 행동을 혐오하며, 선후배 관계에서 의리가 대단합니다.',
          '결단력과 절제력: 맺고 끊음이 확실하여 비효율적인 관계나 상황을 빠르게 정리합니다.',
          '디테일 중심적 완벽주의: 세부 사항을 꿰뚫어 보는 꼼꼼함과 깔끔함이 돋보입니다.'
        ];
        advice = [
          '냉정함과 비판 기질: 타인에게 엄격한 기준을 적용하여 은연중에 비판을 던지기 쉽습니다.',
          '융통성 부족: 규칙과 원칙을 칼같이 지키려다 유연성이 다소 떨어질 우려가 있습니다.',
          '스스로에 대한 채찍질: 완벽해야 한다는 압박에 스스로가 피로해질 수 있으니 쉼을 주십시오.'
        ];
      } else if (dayStem === '수') {
        desc = `귀하는 끝없이 흐르는 강물이나 넓은 바다(물의 기운, 水)를 닮았습니다. 본질적으로 지(智)를 상징하며, 두뇌가 총명하고 유연한 대처 능력을 자랑합니다. 어떤 그릇에 담기더라도 형태를 맞추는 물처럼 환경 적응력과 대인 관계 유연성이 극대화된 성향입니다. 깊은 통찰력과 직관력을 품고 있습니다.`;
        strengths = [
          '유연함과 임기응변: 위기 상황에서 물 흐르듯 유연하게 비껴가며 뛰어난 대안을 찾습니다.',
          '지혜와 통찰력: 남들이 보지 못하는 이면의 원리를 통찰하는 능력이 우수합니다.',
          '친화력과 침착함: 온화하게 흐르듯 침착하여 대인관계의 마찰을 사전에 차단합니다.'
        ];
        advice = [
          '속내를 알 수 없음: 모든 방향으로 유연하여 때로는 본심이 무엇인지 파악하기 힘들다는 평을 듣습니다.',
          '우울감과 생각 과다: 생각이 물처럼 모여 깊어지면 잡념이 되고 우울감으로 변하기 쉽습니다.',
          '일관성 제고: 물줄기가 여러 갈래로 나뉘듯 뚝심이 흐려지고 주위 분위기에 지나치게 휩쓸릴 수 있습니다.'
        ];
      }

      // Populate text
      document.getElementById('temperament-desc').innerHTML = desc;
      
      const strengthsUl = document.getElementById('strengths-list');
      strengthsUl.innerHTML = strengths.map(s => {
        const parts = s.split(':');
        return `<li><span class="bullet">✔</span><span><strong>${parts[0]}</strong>: ${parts[1]}</span></li>`;
      }).join('');

      const adviceUl = document.getElementById('advice-list');
      adviceUl.innerHTML = advice.map(a => {
        const parts = a.split(':');
        return `<li><span class="bullet">⚠</span><span><strong>${parts[0]}</strong>: ${parts[1]}</span></li>`;
      }).join('');
    }
  </script>
</body>
</html>
